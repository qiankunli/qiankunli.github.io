remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: default

locale: zh-CN
timezone: Asia/Shanghai

title: 李乾坤的博客
name: 李乾坤
description: 记录 AI、工程架构、系统设计与个人思考。
url: "https://qiankunli.github.io"
baseurl: ""
repository: qiankunli/qiankunli.github.io
permalink: /:year/:month/:day/:title.html

logo: /public/upload/gavatar/gavatar.jpg
masthead_title: 李乾坤的博客
breadcrumbs: true
search: true
search_full_content: true

paginate: 10
paginate_path: /page:num/

author:
  name: 李乾坤
  avatar: /public/upload/gavatar/gavatar.jpg
  bio: AI、系统与工程实践
  location: Shanghai
  links:
    - label: GitHub
      icon: fab fa-github
      url: https://github.com/qiankunli
    - label: Email
      icon: fas fa-envelope
      url: mailto:qiankun.li@qq.com
    - label: RSS
      icon: fas fa-rss
      url: /feed.xml

footer:
  links:
    - label: GitHub
      icon: fab fa-github
      url: https://github.com/qiankunli
    - label: Email
      icon: fas fa-envelope
      url: mailto:qiankun.li@qq.com

comments:
  provider: giscus
  giscus:
    repo_id: MDEwOlJlcG9zaXRvcnkyMTY0NTUyNA==
    category_name: Announcements
    category_id: DIC_kwDOAUpI1M4C5dyQ
    discussion_term: pathname
    reactions_enabled: 1
    theme: preferred_color_scheme

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: false
      related: true
      show_date: true
      toc: true
      classes: wide
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

atom_feed:
  path: feed.xml
date_format: "%Y/%m/%d"

search_provider: lunr
lunr:
  search_within_pages: true

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - LICENSE.txt
  - AGENTS.md

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-include-cache
