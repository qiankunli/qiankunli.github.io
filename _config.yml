# The Site Configuration

remote_theme: cotes2020/jekyll-theme-chirpy

lang: zh-CN
timezone: Asia/Shanghai

title: 李乾坤的博客
tagline: AI、系统与工程实践
description: >-
  记录 AI、工程架构、系统设计与个人思考。

url: "https://qiankunli.github.io"
baseurl: ""
permalink: /:year/:month/:day/:title.html
paginate: 10

github:
  username: qiankunli

social:
  name: 李乾坤
  email: qiankun.li@qq.com
  links:
    - https://github.com/qiankunli
    - https://qiankunli.github.io

avatar: /public/upload/gavatar/gavatar.jpg

toc: true

comments:
  provider: giscus
  giscus:
    repo: qiankunli/qiankunli.github.io
    repo_id: MDEwOlJlcG9zaXRvcnkyMTY0NTUyNA==
    category: Announcements
    category_id: DIC_kwDOAUpI1M4C5dyQ
    mapping: pathname
    strict: 0
    input_position: bottom
    lang: zh-CN
    reactions_enabled: 1

pwa:
  enabled: true
  cache:
    enabled: true

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - LICENSE.txt
  - purgecss.js
  - "*.config.js"
  - "package*.json"
  - AGENTS.md

plugins:
  - jekyll-remote-theme
  - jekyll-archives
  - jekyll-paginate

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
